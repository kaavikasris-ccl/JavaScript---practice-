<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Item Example</title>
</head>

<body>

    <p id="para">Hello</p>
<button onclick="changeColor()">Change Color</button>

<script>
function changeColor() {
  document.getElementById("para").style.color = "red";
}
</script>

</body>
</html>
